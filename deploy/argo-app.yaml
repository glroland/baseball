apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: baseball
spec:
  destination:
    name: in-cluster
    namespace: baseball-prod
    server: https://kubernetes.default.svc
  source:
    path: deploy/baseball
    repoURL: https://github.com/glroland/baseball.git
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  sources: []
  project: default


